name: Release

# Etiket (tag) push'unda 4 platformu build + paketle, sonra tek bir GitHub
# Release'e 5 asset olarak ekle. Public repo runner'ları ücretsiz; gizli
# (secret) yalnız Android imzalamada gerekir.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Restore release keystore
        working-directory: app
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 yok — APK debug ile imzalanacak (dağıtım için DEĞİL)."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/skapp-release.jks
          {
            echo "storePassword=$STORE_PW"
            echo "keyPassword=$KEY_PW"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=skapp-release.jks"
          } > android/key.properties
      - run: flutter pub get
        working-directory: app
      - run: bash scripts/package_android.sh "$GITHUB_WORKSPACE/dist"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/SKAPP-android.apk

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev \
            libayatana-appindicator3-dev libfuse2
      - run: flutter pub get
        working-directory: app
      - run: bash scripts/package_linux.sh "$GITHUB_WORKSPACE/dist"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/SKAPP-linux-x86_64.AppImage
            dist/SKAPP-linux-amd64.deb

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: choco install innosetup -y
      - run: flutter pub get
        working-directory: app
      - name: Build + package (Inno Setup, unsigned)
        shell: pwsh
        run: ./scripts/package_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/SKAPP-windows-setup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: brew install create-dmg
      - run: flutter pub get
        working-directory: app
      - name: Build + package (ad-hoc DMG, not notarized)
        run: bash scripts/package_macos.sh "$GITHUB_WORKSPACE/dist"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/SKAPP-macos.dmg

  release:
    needs: [android, linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir -p dist
          find artifacts -type f \( \
            -name '*.apk' -o -name '*.dmg' -o -name '*.exe' \
            -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist/ \;
          ls -la dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: .github/RELEASE_TEMPLATE.md
          draft: false
          # Beta'yı normal (pre-release DEĞİL) yayınla ki
          # releases/latest/download/<asset> kalıcı linkleri çalışsın.
          prerelease: false
          fail_on_unmatched_files: true
